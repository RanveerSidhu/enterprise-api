name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore EnterpriseApp.sln

      - name: Build solution
        run: dotnet build EnterpriseApp.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test tests/Application.Tests/Application.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Run integration tests
        run: dotnet test tests/Api.Tests/Api.Tests.csproj --configuration Release --no-build --verbosity normal

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag enterprise-api:latest .
